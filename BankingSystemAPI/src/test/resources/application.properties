# Test-only overrides.
#
# spring.test.database.replace=none: Spring Boot's TestDatabaseAutoConfiguration otherwise
# silently swaps our configured H2 datasource for a randomly-named embedded one (no
# MODE=MySQL) on some @SpringBootTest contexts, which is a source of hard-to-diagnose,
# context-dependent behavior differences between test classes. Keep every test on the same
# datasource config as `dev` (H2 in MySQL compatibility mode).
spring.test.database.replace=none

# Belt-and-suspenders: make sure the dev profile (and therefore application-dev.properties'
# datasource config) is active for every test context regardless of classpath resource merge
# ordering between this file and src/main/resources/application.properties.
spring.profiles.default=dev

# The RateLimitFilter is a singleton with in-memory state shared across every @SpringBootTest
# class that reuses the cached application context within one test JVM; many test classes hit
# /api/auth/register from the same MockMvc "client IP" in a single run, so the production
# default of 10/min would make the suite flaky. This just raises the ceiling for tests.
app.rate-limit.max-requests=100000
