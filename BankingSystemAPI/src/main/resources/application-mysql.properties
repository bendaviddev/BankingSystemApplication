# Use with: SPRING_PROFILES_ACTIVE=mysql and a ../.env file
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=never

spring.h2.console.enabled=false

# Schema is managed by Flyway (see db/migration). Pre-existing databases created by the
# old setup-mysql.sh schema step are treated as already at V1 so Flyway doesn't try to
# recreate tables that already exist.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
