# Use with: SPRING_PROFILES_ACTIVE=mysql and a ../.env file
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=never

spring.h2.console.enabled=false

# Production: manage schema with migrations (Flyway/Liquibase), not ddl-auto.
# This project uses SQL scripts via setup-mysql.sh — keep spring.sql.init.mode=never.
