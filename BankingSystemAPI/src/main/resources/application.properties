spring.application.name=banking-system-api
spring.profiles.default=dev
spring.config.import=optional:file:../.env[.properties]

server.port=8080

# Do not expose stack traces to API clients
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# H2 console must stay off unless you explicitly enable it for local debugging
spring.h2.console.enabled=false

# CORS allowlist (comma-separated). Override with the APP_CORS_ORIGINS env var in prod.
app.cors-origins=${APP_CORS_ORIGINS:http://localhost:5173}

# Only honor X-Forwarded-For for rate limiting when actually running behind a trusted proxy.
app.trust-proxy=${APP_TRUST_PROXY:false}

# Requests per client IP per endpoint per 60s window for /api/auth/login, /api/auth/register,
# and /api/accounts/lookup.
app.rate-limit.max-requests=${APP_RATE_LIMIT_MAX_REQUESTS:10}
